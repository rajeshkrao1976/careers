<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careers | Raveone Consultants</title>
  
  <link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/D560BAQEPjP3aKt0lyg/company-logo_200_200/B56ZU2_QxhHEAM-/0/1740384308771/hiregrow_consultants_logo?e=1771459200&v=beta&t=lB1EaAdg4Jwoj7MnO_Gsy9HmVrascy0YTLkTN2ndvUg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; color: #1F2937; -webkit-font-smoothing: antialiased; }
    .bg-brand { background-color: #714B67; }
    .text-brand { color: #714B67; }
    .border-brand { border-color: #714B67; }
    .hidden-view { display: none !important; }
    .btn-brand { background-color: #714B67; color: white; border-radius: 0px; text-transform: uppercase; font-weight: 700; transition: all 0.2s; }
    .btn-brand:hover { background-color: #5D3A53; }
    .btn-brand:disabled { background-color: #9CA3AF; cursor: not-allowed; }
    .odoo-card { border: 1px solid #E5E7EB; background: #FFFFFF; transition: all 0.2s ease; }
    .odoo-card:hover { border-color: #714B67; box-shadow: 0 4px 12px rgba(113, 75, 103, 0.08); }
    .formatted-text ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    #notification-toast { transition: transform 0.3s ease-out, opacity 0.3s ease-out; transform: translateY(100px); }
    #notification-toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center p-6 text-center">
    <div class="w-10 h-10 border-4 border-gray-100 border-t-[#714B67] animate-spin mb-4"></div>
    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Loading Raveone Portal...</p>
  </div>

  <!-- NOTIFICATION -->
  <div id="notification-toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[1000] opacity-0 pointer-events-none">
    <div class="bg-gray-900 text-white px-6 py-3 shadow-2xl flex items-center gap-3">
      <i data-lucide="info" class="w-4 h-4 text-brand"></i>
      <span id="notification-text" class="text-[11px] font-bold uppercase tracking-widest"></span>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="bg-brand text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
      <div class="flex items-center gap-4 cursor-pointer" onclick="switchView('public-list')">
        <div class="bg-white p-1">
          <img src="https://media.licdn.com/dms/image/v2/D560BAQEPjP3aKt0lyg/company-logo_200_200/B56ZU2_QxhHEAM-/0/1740384308771/hiregrow_consultants_logo?e=1771459200&v=beta&t=lB1EaAdg4Jwoj7MnO_Gsy9HmVrascy0YTLkTN2ndvUg" alt="Logo" class="h-12">
        </div>
        <div class="flex flex-col">
          <span class="font-extrabold tracking-tighter text-2xl leading-none">RAVEONE</span>
          <span class="text-[10px] font-bold tracking-[0.3em] uppercase opacity-80">Consultants</span>
        </div>
      </div>
      <div class="flex gap-6 items-center">
        <button onclick="switchView('public-list')" class="text-[11px] font-bold uppercase tracking-widest hover:text-white/70">Openings</button>
        <div id="admin-menu" class="hidden-view flex gap-6 border-l border-white/20 pl-6 items-center">
          <button onclick="switchView('admin-candidates')" class="text-[11px] font-bold uppercase tracking-widest hover:text-white/70">Applicants</button>
          <button onclick="logoutAdmin()" class="text-white/50 hover:text-white"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow">
    <!-- VIEW: ADMIN LOGIN -->
    <section id="view-admin-login" class="hidden-view max-w-md mx-auto py-32 px-6">
      <div class="odoo-card p-10 shadow-xl">
        <h2 class="text-xs font-black uppercase tracking-widest mb-6 text-center text-gray-400">Admin Login</h2>
        <input type="password" id="admin-pass-input" placeholder="Password" class="w-full border p-4 mb-4 text-sm focus:border-brand outline-none">
        <button onclick="handleAdminLogin()" class="w-full btn-brand py-4 text-[10px] tracking-widest">Login</button>
        <p id="login-error" class="text-red-500 text-[10px] mt-4 font-bold text-center hidden-view">ACCESS DENIED</p>
      </div>
    </section>

    <!-- VIEW: JOB LIST -->
    <section id="view-public-list" class="max-w-7xl mx-auto px-6 py-16">
      <h1 class="text-4xl font-black text-gray-900 uppercase tracking-widest mb-12 border-b pb-8">Current Roles</h1>
      <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <div id="no-jobs-state" class="hidden-view py-20 text-center border-2 border-dashed border-gray-100 italic text-gray-400">No active positions found.</div>
    </section>

    <!-- VIEW: JOB DETAIL -->
    <section id="view-public-detail" class="hidden-view max-w-5xl mx-auto px-6 py-16">
      <button onclick="switchView('public-list')" class="mb-8 flex items-center text-[10px] font-bold text-gray-400 hover:text-brand uppercase tracking-widest">
        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Roles
      </button>
      <div id="job-detail-container"></div>
    </section>

    <!-- VIEW: ADMIN APPLICANTS -->
    <section id="view-admin-candidates" class="hidden-view w-full px-6 py-12">
      <div class="odoo-card overflow-hidden">
        <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
          <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500">Applicant Database</h2>
          <button onclick="fetchCandidates()" class="text-brand text-[10px] font-bold flex items-center gap-2 uppercase tracking-widest border border-brand/20 px-4 py-2 hover:bg-brand/5">
            <i data-lucide="refresh-cw" class="w-3 h-3"></i> Sync
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50">
              <tr>
                <th class="p-4 text-[10px] font-black uppercase text-gray-400">ID</th>
                <th class="p-4 text-[10px] font-black uppercase text-gray-400">Candidate</th>
                <th class="p-4 text-[10px] font-black uppercase text-gray-400">Role</th>
                <th class="p-4 text-[10px] font-black uppercase text-gray-400">Experience</th>
                <th class="p-4 text-[10px] font-black uppercase text-gray-400">CV</th>
              </tr>
            </thead>
            <tbody id="candidates-table" class="text-xs"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL: APPLY -->
  <div id="modal-apply" class="fixed inset-0 z-[100] hidden-view bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-2xl p-10 odoo-card shadow-2xl overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-8 border-b pb-4">
        <h3 class="text-xl font-bold uppercase tracking-widest">Apply for Position</h3>
        <button onclick="closeApplyModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
      </div>
      <form id="form-apply" class="space-y-4">
        <input type="hidden" id="app-job-id">
        <input type="hidden" id="app-job-title">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input name="name" placeholder="Full Name *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="email" type="email" placeholder="Email *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="phone" placeholder="Phone *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="location" placeholder="City *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="totalExp" placeholder="Total Exp (Yrs) *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="relExp" placeholder="Rel Exp (Yrs) *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="ctc" placeholder="Current CTC *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="expCtc" placeholder="Expected CTC *" required class="border p-3 text-sm focus:border-brand outline-none">
          <input name="notice" placeholder="Notice Period *" required class="border p-3 text-sm md:col-span-2 focus:border-brand outline-none">
        </div>
        <div class="border-2 border-dashed border-gray-200 p-8 text-center bg-gray-50 hover:border-brand transition">
          <label class="cursor-pointer block">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Upload CV (PDF)</span>
            <input type="file" id="resume-file" accept=".pdf" required class="text-[10px] mx-auto block">
          </label>
        </div>
        <button type="submit" id="submit-btn" class="w-full btn-brand py-4 text-xs tracking-widest">Submit Application</button>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzW1v7m7ZkvmPNxJCn2SuYKxC98rhw1DSngtczmrt66XTjt2iEau2sfin2ekcbt-DTEWQ/exec";
    let ALL_JOBS = [];
    let ADMIN_TOKEN = sessionStorage.getItem('raveone_token') || "";

    function showNotification(text) {
      const toast = document.getElementById('notification-toast');
      document.getElementById('notification-text').innerText = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function formatTextToHtml(text) {
      if (!text) return '';
      const lines = text.split(/\r?\n|•|-|\*/).map(l => l.trim()).filter(l => l.length > 0);
      return lines.length > 1 ? `<ul class="list-disc ml-5 space-y-2">${lines.map(l => `<li>${l}</li>`).join('')}</ul>` : `<p>${text}</p>`;
    }

    window.onload = function() {
      lucide.createIcons();
      const params = new URLSearchParams(window.location.search);
      if (params.get('page') === 'admin') {
        if (!ADMIN_TOKEN) switchView('admin-login');
        else {
          document.getElementById('admin-menu').classList.remove('hidden-view');
          switchView('admin-candidates');
        }
      } else {
        switchView('public-list');
      }
      fetchJobs();
    };

    async function fetchJobs() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getJobs`);
        const data = await res.json();
        document.getElementById('loader').classList.add('hidden-view');
        ALL_JOBS = data || [];
        renderPublicList();
      } catch (e) { 
        document.getElementById('loader').innerHTML = '<p class="text-red-500 font-bold">DATABASE SYNC ERROR</p>';
      }
    }

    function renderPublicList() {
      const active = ALL_JOBS.filter(j => String(j.status).toLowerCase() === 'active');
      const container = document.getElementById('job-grid');
      if (active.length === 0) {
        document.getElementById('no-jobs-state').classList.remove('hidden-view');
        return;
      }
      container.innerHTML = active.map(job => `
        <div class="odoo-card p-8 flex flex-col h-full cursor-pointer group" onclick="renderJobDetail('${job.id}')">
          <div class="flex justify-between items-start mb-6">
            <h3 class="text-xl font-bold group-hover:text-brand transition">${job.title}</h3>
            <span class="text-[9px] font-black border px-2 py-1 uppercase tracking-widest">${job.type}</span>
          </div>
          <p class="text-xs text-gray-500 mb-8 font-medium flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${job.location}</p>
          <div class="mt-auto flex justify-between items-center text-[9px] font-bold text-gray-400 tracking-widest uppercase border-t pt-4">
            <span>EXP: ${job.minExp}+ YRS</span>
            <span class="text-brand font-black group-hover:underline">VIEW ROLE <i data-lucide="chevron-right" class="w-3 h-3 ml-0.5 inline"></i></span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderJobDetail(id) {
      const job = ALL_JOBS.find(j => String(j.id) === String(id));
      if (!job) return;
      document.getElementById('job-detail-container').innerHTML = `
        <div class="mb-12 border-b border-gray-100 pb-12 flex flex-col md:flex-row justify-between items-start gap-8">
          <div>
            <span class="text-[10px] font-black text-brand uppercase tracking-widest">${job.company}</span>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight leading-tight">${job.title}</h1>
          </div>
          <button onclick="openApplyModal('${job.id}', '${encodeURIComponent(job.title)}')" class="btn-brand px-12 py-5 text-xs shadow-xl shadow-brand/10">Apply Now</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 bg-gray-50 p-8 mb-12 border border-gray-100">
           <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Exp Required</p><p class="text-sm font-bold">${job.minExp} - ${job.maxExp} Yrs</p></div>
           <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Location</p><p class="text-sm font-bold">${job.location}</p></div>
           <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Budget</p><p class="text-sm font-bold text-emerald-600">${job.minSal} - ${job.maxSal}</p></div>
           <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Industry</p><p class="text-sm font-bold">${job.industry}</p></div>
        </div>
        <div class="space-y-12">
          <section><h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest mb-4 border-l-4 border-brand pl-3">Description</h3><div class="formatted-text">${formatTextToHtml(job.description)}</div></section>
          <section><h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest mb-4 border-l-4 border-brand pl-3">Key Requirements</h3><div class="formatted-text">${formatTextToHtml(job.requirements)}</div></section>
        </div>
      `;
      switchView('public-detail');
      lucide.createIcons();
    }

    async function handleAdminLogin() {
      const pass = document.getElementById('admin-pass-input').value;
      ADMIN_TOKEN = pass;
      await fetchCandidates();
    }

    async function fetchCandidates() {
      const table = document.getElementById('candidates-table');
      table.innerHTML = '<tr><td colspan="5" class="p-8 text-center animate-pulse">Syncing...</td></tr>';
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getApplications&token=${encodeURIComponent(ADMIN_TOKEN)}`);
        const data = await res.json();
        if (data.error) {
          document.getElementById('login-error').classList.remove('hidden-view');
          return;
        }
        sessionStorage.setItem('raveone_token', ADMIN_TOKEN);
        document.getElementById('admin-menu').classList.remove('hidden-view');
        switchView('admin-candidates');
        table.innerHTML = data.map(c => `
          <tr class="border-b hover:bg-gray-50">
            <td class="p-4 font-mono text-[10px] text-gray-400">${c.appId}</td>
            <td class="p-4"><b>${c.name}</b><br><span class="text-gray-400">${c.email}</span></td>
            <td class="p-4">${c.jobTitle}</td>
            <td class="p-4">Tot: ${c.totalExp}y / Rel: ${c.relExp}y</td>
            <td class="p-4"><a href="${c.resume}" target="_blank" class="text-brand font-bold uppercase text-[10px] hover:underline">View CV</a></td>
          </tr>
        `).join('');
      } catch (e) { showNotification("Sync Error"); }
    }

    function openApplyModal(id, title) {
      document.getElementById('app-job-id').value = id;
      document.getElementById('app-job-title').value = decodeURIComponent(title);
      document.getElementById('modal-apply').classList.remove('hidden-view');
    }

    function closeApplyModal() {
      document.getElementById('modal-apply').classList.add('hidden-view');
      document.getElementById('form-apply').reset();
    }

    function switchView(id) {
      document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden-view'));
      document.getElementById('view-' + id).classList.remove('hidden-view');
      window.scrollTo(0,0);
    }

    document.getElementById('form-apply').onsubmit = function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerText = "Uploading CV...";
      btn.disabled = true;

      const file = document.getElementById('resume-file').files[0];
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = async function() {
        const payload = { resumeBase64: reader.result };
        new FormData(e.target).forEach((v, k) => payload[k] = v);
        payload.jobId = document.getElementById('app-job-id').value;
        payload.jobTitle = document.getElementById('app-job-title').value;

        try {
          const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
          const json = await res.json();
          if (json.success) {
            showNotification("APPLICATION SUBMITTED SUCCESSFULY");
            closeApplyModal();
          } else {
            showNotification("ERROR: " + json.message);
          }
        } catch (err) { showNotification("NETWORK ERROR"); }
        finally {
          btn.innerText = "Submit Application";
          btn.disabled = false;
        }
      };
    };
  </script>
</body>
</html>
