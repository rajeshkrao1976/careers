<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Raveone Consultants</title>

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="googlefd87621aff648b9a" />
    <meta name="description" id="meta-desc" content="Apply for CMM Operator, Mechanical Engineer, and Technical roles at Raveone Consultants Bangalore.">
    <link rel="canonical" id="canonical-link" href="https://rajeshkrao1976.github.io/careers/">
    
    <!-- SEO & Brand Assets -->
    <link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/D560BAQEPjP3aKt0lyg/company-logo_200_200/B56ZU2_QxhHEAM-/0/1740384308771/hiregrow_consultants_logo?e=1771459200&v=beta&t=lB1EaAdg4Jwoj7MnO_Gsy9HmVrascy0YTLkTN2ndvUg">

    <script type="application/ld+json" id="static-jobs-schema">
    [
      {
        "@context": "https://schema.org/",
        "@type": "JobPosting",
        "title": "CMM Operator",
        "description": "Hiring experienced CMM Operators in Bangalore. Skilled in Zeiss/Hexagon and Calypso software. 25k-30k CTC.",
        "datePosted": "2026-04-20",
        "validThrough": "2026-06-20",
        "employmentType": "FULL_TIME",
        "hiringOrganization": {
          "@type": "Organization",
          "name": "Raveone Consultants",
          "sameAs": "https://www.raveone.in",
          "logo": "https://media.licdn.com/dms/image/v2/D560BAQEPjP3aKt0lyg/company-logo_200_200/B56ZU2_QxhHEAM-/0/1740384308771/hiregrow_consultants_logo?e=1771459200&v=beta&t=lB1EaAdg4Jwoj7MnO_Gsy9HmVrascy0YTLkTN2ndvUg"
        },
        "jobLocation": {
          "@type": "Place",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Peenya / Whitefield",
            "addressLocality": "Bangalore",
            "addressRegion": "KA",
            "addressCountry": "IN"
          }
        },
        "baseSalary": {
          "@type": "MonetaryAmount",
          "currency": "INR",
          "value": {
            "@type": "QuantitativeValue",
            "minValue": 25000,
            "maxValue": 30000,
            "unitText": "MONTH"
          }
        }
      }
    ]
    </script>

    <script type="application/ld+json" id="job-schema">{}</script>

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; color: #1F2937; -webkit-font-smoothing: antialiased; }
        .bg-brand { background-color: #714B67; }
        .text-brand { color: #714B67; }
        .border-brand { border-color: #714B67; }
        .hidden-view { display: none !important; }
        .odoo-card { border: 1px solid #E5E7EB; border-radius: 0px; background: #FFFFFF; transition: all 0.2s ease; cursor: pointer; }
        .odoo-card:hover { border-color: #714B67; box-shadow: 0 4px 12px rgba(113, 75, 103, 0.08); }
        .btn-brand { background-color: #714B67; color: white; border-radius: 0px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; transition: all 0.2s; }
        .btn-brand:hover { background-color: #5D3A53; }
        .btn-brand:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        .skill-pill { background: #F3F4F6; color: #4B5563; padding: 2px 8px; font-size: 10px; font-weight: 700; border: 1px solid #E5E7EB; text-transform: uppercase; }
        .filter-input { border: 1px solid #E5E7EB; padding: 10px 12px; font-size: 13px; outline: none; transition: border 0.2s; }
        .filter-input:focus { border-color: #714B67; }
        
        .formatted-text { line-height: 1.8; font-size: 0.95rem; white-space: normal; color: #4B5563; }
        .formatted-text p { margin-bottom: 1rem; }
        .formatted-text strong { color: #1F2937; font-weight: 700; }
        .formatted-text ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        
        #notification-toast { transition: transform 0.3s ease-out, opacity 0.3s ease-out; transform: translateY(100px); }
        #notification-toast.show { transform: translateY(0); opacity: 1; }

        /* Custom Table Styling */
        th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #9CA3AF; padding: 12px 16px; border-bottom: 1px solid #F3F4F6; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LOADING OVERLAY -->
    <div id="loader" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-10 h-10 border-4 border-gray-100 border-t-[#714B67] animate-spin mb-4"></div>
        <div class="h-12 mb-4 font-black text-brand text-2xl tracking-tighter uppercase">Raveone</div>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest animate-pulse">Syncing Google Job Board...</p>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div id="notification-toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[1000] opacity-0 pointer-events-none">
        <div id="notification-content" class="bg-gray-900 text-white px-6 py-3 shadow-2xl flex items-center gap-3">
            <i data-lucide="info" class="w-4 h-4 text-brand"></i>
            <span id="notification-text" class="text-[11px] font-bold uppercase tracking-widest">Message</span>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="bg-brand text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="handleHomeNavigation()">
                <div class="flex flex-col">
                    <span class="font-extrabold tracking-tighter text-xl leading-none">RAVEONE</span>
                    <span class="text-[9px] font-bold tracking-[0.2em] opacity-80 uppercase">Consultants</span>
                </div>
            </div>
            <div class="flex gap-6 items-center">
                <button onclick="handleHomeNavigation()" class="text-[11px] font-bold uppercase tracking-widest hover:text-white/70">Openings</button>
                <div id="admin-menu" class="hidden-view flex gap-6 border-l border-white/20 pl-6 items-center">
                    <button onclick="switchView('admin-candidates')" class="text-[11px] font-bold uppercase tracking-widest hover:text-white/70">Applicants</button>
                    <button onclick="logoutAdmin()" class="text-white/50 hover:text-white transition"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
                <button id="nav-login-btn" onclick="switchView('admin-login')" class="text-[11px] font-bold uppercase tracking-widest hover:text-white/70">Admin</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <!-- VIEW: PUBLIC LIST -->
        <section id="view-public-list" class="max-w-7xl mx-auto px-6 py-12">
            <div class="mb-10">
                <h1 class="text-3xl font-black text-gray-900 uppercase tracking-widest mb-8">Careers</h1>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-6 border border-gray-200">
                    <div class="md:col-span-2 relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="filter-search" oninput="applyFilters()" placeholder="Search titles or keywords..." class="filter-input w-full pl-10">
                    </div>
                    <div>
                        <select id="filter-location" onchange="applyFilters()" class="filter-input w-full bg-white">
                            <option value="">All Locations</option>
                        </select>
                    </div>
                    <div>
                        <select id="filter-type" onchange="applyFilters()" class="filter-input w-full bg-white">
                            <option value="">All Job Types</option>
                            <option value="Full Time">Full Time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                </div>
                <div id="filter-results-count" class="mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest"></div>
            </div>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- VIEW: PUBLIC DETAIL -->
        <section id="view-public-detail" class="hidden-view max-w-5xl mx-auto px-6 py-16">
            <button onclick="handleHomeNavigation()" class="mb-8 flex items-center text-[10px] font-bold text-gray-400 hover:text-brand tracking-widest uppercase transition">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Jobs
            </button>
            <div id="job-detail-container"></div>
        </section>

        <!-- VIEW: ADMIN LOGIN -->
        <section id="view-admin-login" class="hidden-view max-w-md mx-auto py-32 px-6">
            <div class="odoo-card p-10 bg-white shadow-xl text-center">
                <h2 class="text-xs font-black uppercase tracking-[0.2em] mb-6 text-gray-400">Admin Login</h2>
                <input type="password" id="admin-pass-input" placeholder="Password" class="w-full border p-4 mb-4 outline-none focus:border-brand text-sm">
                <button onclick="handleAdminLogin()" class="w-full bg-brand text-white py-4 text-[10px] font-bold uppercase tracking-widest">Enter Portal</button>
            </div>
        </section>

        <!-- VIEW: ADMIN CANDIDATES -->
        <section id="view-admin-candidates" class="hidden-view w-full px-6 py-12">
            <div class="odoo-card">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500">Applicant Tracking</h2>
                    <button onclick="fetchCandidates()" class="text-brand text-[10px] font-bold flex items-center gap-2 border border-brand/20 px-4 py-2 hover:bg-brand/5">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Sync
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr>
                                <th>Candidate Info</th>
                                <th>Role Details</th>
                                <th>Experience</th>
                                <th>Financials & Notice</th>
                                <th>Resume</th>
                                <th>Applied</th>
                            </tr>
                        </thead>
                        <tbody id="candidates-table"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- APPLY MODAL -->
    <div id="modal-apply" class="fixed inset-0 z-[100] hidden-view bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl p-10 odoo-card shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h3 class="text-xl font-bold uppercase tracking-widest">Apply Now</h3>
                <button onclick="closeApplyModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <form id="form-apply" class="space-y-6">
                <input type="hidden" id="app-job-id">
                <input type="hidden" id="app-job-title">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input name="name" placeholder="Full Name *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="email" type="email" placeholder="Email *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="phone" placeholder="Phone *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="location" placeholder="Candidate Location (City) *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="education" placeholder="Highest Education *" required class="border p-3 text-sm md:col-span-2 focus:border-brand outline-none">
                    <input name="totalExp" placeholder="Total Exp (Yrs) *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="relExp" placeholder="Rel Exp (Yrs) *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="ctc" placeholder="Current CTC *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="expCtc" placeholder="Expected CTC *" required class="border p-3 text-sm focus:border-brand outline-none">
                    <input name="notice" placeholder="Notice Period *" required class="border p-3 text-sm md:col-span-2 focus:border-brand outline-none">
                </div>
                <div class="border-2 border-dashed border-gray-200 p-8 text-center bg-gray-50 hover:border-brand group">
                    <label class="cursor-pointer block">
                        <span class="text-[10px] font-bold text-gray-400 group-hover:text-brand uppercase tracking-widest mb-2 block">Upload Resume (PDF)</span>
                        <input type="file" id="resume-file" accept=".pdf" required class="text-[10px] mx-auto block">
                    </label>
                </div>
                <button type="submit" id="submit-btn" class="w-full btn-brand py-4 text-xs">Send Application</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyO8MBYVSRh39EsNRfha_XBowKws3sS0vn2k9HpX2ut6coy4j-sYftaYu_J_G-XUbG2_A/exec";
        
        let ALL_JOBS = [];
        let FILTERED_JOBS = [];
        let ADMIN_TOKEN = sessionStorage.getItem('raveone_token') || "";

        function showNotification(text) {
            const toast = document.getElementById('notification-toast');
            document.getElementById('notification-text').innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function getVal(obj, targetKey) {
            if (!obj) return null;
            const normalizedTarget = targetKey.toLowerCase().replace(/\s/g, '');
            for (let key in obj) {
                if (key.toLowerCase().replace(/\s/g, '') === normalizedTarget) return obj[key];
            }
            return null;
        }

        function formatTextToHtml(text) {
            if (!text) return 'Not provided';
            let formatted = String(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return formatted.split('\n').map(p => `<p class="mb-2">${p}</p>`).join('');
        }

        function injectJobSchema(job) {
            try {
                const schemaTag = document.getElementById('job-schema');
                const cleanTitle = (getVal(job, 'title') || "").replace(/J\d+/g, '').replace(/[\(\)\[\]\-\:\#]/g, ' ').trim();
                const postDate = getVal(job, 'postedDate') || new Date().toISOString().split('T')[0];
                const expiryDate = new Date(new Date(postDate).getTime() + 60 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                const schemaData = {
                    "@context": "https://schema.org/",
                    "@type": "JobPosting",
                    "title": cleanTitle,
                    "description": (getVal(job, 'description') || "") + "\n\nRequirements:\n" + (getVal(job, 'requirements') || ""),
                    "datePosted": postDate,
                    "validThrough": expiryDate,
                    "employmentType": getVal(job, 'type') === "Contract" ? "CONTRACTOR" : "FULL_TIME",
                    "hiringOrganization": {
                        "@type": "Organization",
                        "name": "Raveone Consultants",
                        "sameAs": "https://www.raveone.in",
                        "logo": "https://media.licdn.com/dms/image/v2/D560BAQEPjP3aKt0lyg/company-logo_200_200/B56ZU2_QxhHEAM-/0/1740384308771/hiregrow_consultants_logo?e=1771459200&v=beta&t=lB1EaAdg4Jwoj7MnO_Gsy9HmVrascy0YTLkTN2ndvUg"
                    },
                    "jobLocation": {
                        "@type": "Place",
                        "address": {
                            "@type": "PostalAddress",
                            "addressLocality": getVal(job, 'location') || "Bangalore",
                            "addressRegion": "KA",
                            "addressCountry": "IN"
                        }
                    },
                    "baseSalary": {
                        "@type": "MonetaryAmount",
                        "currency": "INR",
                        "value": {
                            "@type": "QuantitativeValue",
                            "minValue": parseInt(getVal(job, 'minSal')) || 25000,
                            "maxValue": parseInt(getVal(job, 'maxSal')) || 30000,
                            "unitText": "MONTH"
                        }
                    },
                    "identifier": {
                        "@type": "PropertyValue",
                        "name": "Raveone",
                        "value": getVal(job, 'id')
                    }
                };
                schemaTag.text = JSON.stringify(schemaData);
                document.title = `${cleanTitle} | Careers | Raveone`;
                document.getElementById('meta-desc').content = `Job vacancy: ${cleanTitle} in ${getVal(job, 'location')}. Exp: ${getVal(job, 'minExp')}+ Yrs.`;
                document.getElementById('canonical-link').href = window.location.href;
            } catch(e) { console.error("Schema error", e); }
        }

        window.onload = function() {
            lucide.createIcons();
            fetchJobs();
        };

        async function fetchJobs() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getJobs`);
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden-view');
                if (data && !data.error) {
                    ALL_JOBS = Array.isArray(data) ? data : [];
                    populateFilters();
                    const urlParams = new URLSearchParams(window.location.search);
                    const qId = urlParams.get('jobId');
                    if (qId) {
                        const target = ALL_JOBS.find(j => String(getVal(j, 'id')).trim() === String(qId).trim());
                        if (target) { renderJobDetail(qId); return; }
                    }
                    applyFilters();
                }
            } catch (e) { document.getElementById('loader').innerHTML = "<p class='p-10 text-red-500'>Connection Error. Refresh.</p>"; }
        }

        function populateFilters() {
            const locs = [...new Set(ALL_JOBS.map(j => getVal(j, 'location')))].sort();
            const locSelect = document.getElementById('filter-location');
            locs.forEach(l => { if(l) locSelect.innerHTML += `<option value="${l}">${l}</option>`; });
        }

        function applyFilters() {
            const search = (document.getElementById('filter-search').value || "").toLowerCase();
            const loc = document.getElementById('filter-location').value;
            const type = document.getElementById('filter-type').value;

            FILTERED_JOBS = ALL_JOBS.filter(j => {
                const title = (getVal(j, 'title') || "").toLowerCase();
                const mSearch = !search || title.includes(search) || (getVal(j, 'skills') || "").toLowerCase().includes(search);
                const mLoc = !loc || getVal(j, 'location') === loc;
                const mType = !type || getVal(j, 'type') === type;
                return mSearch && mLoc && mType && String(getVal(j, 'status')).toLowerCase() === 'active';
            });

            document.getElementById('filter-results-count').innerText = `${FILTERED_JOBS.length} positions found`;
            renderPublicList();
        }

        function renderPublicList() {
            const container = document.getElementById('job-grid');
            container.innerHTML = FILTERED_JOBS.map(job => `
                <div class="odoo-card p-8 flex flex-col h-full" onclick="renderJobDetail('${getVal(job, 'id')}')">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-xl font-bold hover:text-brand transition">${getVal(job, 'title')}</h3>
                        <span class="text-[9px] font-black border px-2 py-1 uppercase tracking-widest">${getVal(job, 'type')}</span>
                    </div>
                    <p class="text-xs text-gray-500 mb-8 font-medium flex items-center gap-1.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${getVal(job, 'location')}</p>
                    <div class="mt-auto flex justify-between items-center text-[9px] font-bold text-brand tracking-widest uppercase border-t pt-4">
                        <span>EXP: ${String(getVal(job, 'minExp') || '0').replace(/yrs|yr/gi, '').trim()}+ YRS</span>
                        <span>VIEW DETAIL <i data-lucide="chevron-right" class="w-3 h-3 ml-0.5 inline"></i></span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderJobDetail(id) {
            const job = ALL_JOBS.find(j => String(getVal(j, 'id')).trim() === String(id).trim());
            if (!job) return;

            injectJobSchema(job);
            
            try {
                const newUrl = window.location.origin + window.location.pathname + '?jobId=' + id;
                window.history.pushState({ path: newUrl }, '', newUrl);
            } catch(e) {}

            const minExp = String(getVal(job, 'minExp') || '0').replace(/yrs|yr/gi, '').trim();
            const maxExp = String(getVal(job, 'maxExp') || '').replace(/yrs|yr/gi, '').trim();
            const expRange = maxExp ? `${minExp} - ${maxExp} Yrs` : `${minExp}+ Yrs`;

            document.getElementById('job-detail-container').innerHTML = `
                <div class="mb-12 border-b border-gray-100 pb-12">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                        <div class="space-y-2">
                            <h1 class="text-4xl font-black text-gray-900 tracking-tight">${getVal(job, 'title')}</h1>
                            <div class="flex flex-wrap gap-6 text-sm text-gray-500 font-medium pt-4">
                                <span class="flex items-center gap-1.5"><i data-lucide="map-pin" class="w-4 h-4 text-brand"></i> ${getVal(job, 'location')}</span>
                                <span class="flex items-center gap-1.5"><i data-lucide="briefcase" class="w-4 h-4 text-brand"></i> ${getVal(job, 'type')}</span>
                            </div>
                        </div>
                        <button onclick="openApplyModal('${getVal(job, 'id')}', '${getVal(job, 'title')}')" class="btn-brand px-12 py-5 text-xs shadow-xl w-full md:w-auto">Apply Now</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 bg-gray-50 p-8 mb-12 border border-gray-100">
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Ref ID</p><p class="text-sm font-bold">${getVal(job, 'id')}</p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Experience</p><p class="text-sm font-bold">${expRange}</p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Industry</p><p class="text-sm font-bold">${getVal(job, 'industry') || 'N/A'}</p></div>
                    <div><p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">Education</p><p class="text-sm font-bold">${getVal(job, 'education') || 'N/A'}</p></div>
                </div>

                <div class="space-y-12">
                    <section>
                        <h3 class="text-[11px] font-black uppercase tracking-widest mb-6 border-l-4 border-brand pl-3">Role Overview</h3>
                        <div class="formatted-text">${formatTextToHtml(getVal(job, 'description'))}</div>
                    </section>
                    <section>
                        <h3 class="text-[11px] font-black uppercase tracking-widest mb-6 border-l-4 border-brand pl-3">Requirements</h3>
                        <div class="formatted-text">${formatTextToHtml(getVal(job, 'requirements'))}</div>
                    </section>
                    ${getVal(job, 'benefits') ? `<section><h3 class="text-[11px] font-black uppercase tracking-widest mb-6 border-l-4 border-brand pl-3">Benefits</h3><div class="formatted-text">${formatTextToHtml(getVal(job, 'benefits'))}</div></section>` : ''}
                </div>
            `;
            switchView('public-detail');
            lucide.createIcons();
        }

        function handleHomeNavigation() {
            if (window.location.search) {
                window.location.search = ""; 
            }
            switchView('public-list');
        }

        function switchView(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden-view'));
            document.getElementById('view-' + id).classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function openApplyModal(id, title) {
            document.getElementById('app-job-id').value = id;
            document.getElementById('app-job-title').value = title;
            document.getElementById('modal-apply').classList.remove('hidden-view');
        }

        function closeApplyModal() {
            document.getElementById('modal-apply').classList.add('hidden-view');
            document.getElementById('form-apply').reset();
        }

        document.getElementById('form-apply').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Sending Application...";
            btn.disabled = true;

            const file = document.getElementById('resume-file').files[0];
            const reader = new FileReader();
            reader.onload = async function(f) {
                const payload = { resumeBase64: f.target.result };
                new FormData(e.target).forEach((v, k) => payload[k] = v);
                payload.jobId = document.getElementById('app-job-id').value;
                payload.jobTitle = document.getElementById('app-job-title').value;

                try {
                    const r = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const res = await r.json();
                    if (res.success) { 
                        showNotification("Success! We'll be in touch."); 
                        closeApplyModal(); 
                    } else {
                        showNotification("Error: " + res.message);
                    }
                } catch (err) { 
                    showNotification("Network error. Try again."); 
                } finally { 
                    btn.innerText = "Send Application"; 
                    btn.disabled = false; 
                }
            };
            reader.readAsDataURL(file);
        };

        function handleAdminLogin() {
            ADMIN_TOKEN = document.getElementById('admin-pass-input').value;
            fetchCandidates(true);
        }

        async function fetchCandidates(isLogin = false) {
            const table = document.getElementById('candidates-table');
            table.innerHTML = '<tr><td colspan="6" class="text-center py-10">Loading...</td></tr>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getApplications&token=${encodeURIComponent(ADMIN_TOKEN)}`);
                const data = await res.json();
                if (data.error === "Unauthorized") { 
                    switchView('admin-login'); 
                    return; 
                }
                
                sessionStorage.setItem('raveone_token', ADMIN_TOKEN);
                if (isLogin) {
                    document.getElementById('admin-menu').classList.remove('hidden-view');
                    document.getElementById('nav-login-btn').classList.add('hidden-view');
                    switchView('admin-candidates');
                }

                table.innerHTML = (data || []).map(c => `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-4">
                            <div class="font-bold text-gray-900">${c.name}</div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase">${c.location || 'N/A'}</div>
                            <div class="text-[10px] text-gray-400 mt-1">${c.email} | ${c.phone}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-xs font-semibold text-brand">${c.jobTitle}</div>
                            <div class="text-[10px] text-gray-400 uppercase font-bold">${c.education || 'N/A'}</div>
                        </td>
                        <td class="p-4 text-xs font-medium">
                            <div>Total: ${c.totalExp}Y</div>
                            <div class="text-[10px] text-gray-400">Rel: ${c.relExp}Y</div>
                        </td>
                        <td class="p-4">
                            <div class="text-[10px] font-bold uppercase">C: ${c.ctc || 'N/A'}</div>
                            <div class="text-[10px] font-bold uppercase text-brand">E: ${c.expCtc || 'N/A'}</div>
                            <div class="text-[10px] text-gray-400 mt-1">Notice: ${c.notice || 'N/A'}</div>
                        </td>
                        <td class="p-4">
                            <a href="${c.resume}" target="_blank" class="bg-gray-100 px-3 py-1.5 rounded text-brand font-bold text-[9px] uppercase hover:bg-brand hover:text-white transition">Resume</a>
                        </td>
                        <td class="p-4 text-gray-400 font-bold text-[10px]">${c.date}</td>
                    </tr>
                `).join('');
            } catch (e) { 
                table.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-red-500">Sync Failed</td></tr>`; 
            }
        }

        function logoutAdmin() {
            ADMIN_TOKEN = "";
            sessionStorage.removeItem('raveone_token');
            document.getElementById('admin-menu').classList.add('hidden-view');
            document.getElementById('nav-login-btn').classList.remove('hidden-view');
            handleHomeNavigation();
        }
    </script>
</body>
</html>
